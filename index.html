<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>내 이야기를 들어줘!</title>

  <!-- ============================================================
       전체 스타일 정의
       따뜻하고 안정감 있는 보라/파스텔 계열 색상 사용
       모바일 우선(mobile-first) 반응형 디자인
  ============================================================ -->
  <style>
    /* ── 색상 변수 정의 ── */
    :root {
      --color-bg:          #f5f0ff;   /* 연보라 배경 */
      --color-surface:     #ffffff;   /* 카드/패널 배경 */
      --color-primary:     #7c5cbf;   /* 주요 보라색 */
      --color-primary-lt:  #a68bd4;   /* 연한 보라 */
      --color-accent:      #e8d5ff;   /* 말풍선 AI 배경 */
      --color-user-bubble: #7c5cbf;   /* 사용자 말풍선 배경 */
      --color-text:        #3b2f5e;   /* 기본 텍스트 */
      --color-muted:       #8c7aaa;   /* 보조 텍스트 */
      --color-border:      #ddd0f5;   /* 테두리 */
      --color-error:       #e05c7a;   /* 오류 색상 */
      --radius-bubble:     18px;      /* 말풍선 모서리 */
      --radius-card:       16px;      /* 카드 모서리 */
    }

    /* ── 기본 리셋 & body ── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ────────────────────────────────────────────────
       API KEY 입력 화면 (처음 접속 시 표시)
    ──────────────────────────────────────────────── */
    #api-key-screen {
      display: flex;             /* 기본값: 보임 */
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      width: 100%;
      padding: 24px;
    }

    .api-key-card {
      background: var(--color-surface);
      border-radius: var(--radius-card);
      box-shadow: 0 8px 32px rgba(124, 92, 191, 0.15);
      padding: 40px 32px;
      max-width: 440px;
      width: 100%;
      text-align: center;
    }

    .api-key-card .logo {
      font-size: 2.4rem;
      margin-bottom: 8px;
    }

    .api-key-card h1 {
      font-size: 1.5rem;
      color: var(--color-primary);
      margin-bottom: 8px;
    }

    .api-key-card p.desc {
      font-size: 0.9rem;
      color: var(--color-muted);
      line-height: 1.6;
      margin-bottom: 28px;
    }

    /* 입력 그룹 (label + input) */
    .input-group {
      text-align: left;
      margin-bottom: 16px;
    }

    .input-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--color-primary);
      margin-bottom: 6px;
    }

    .input-group input {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid var(--color-border);
      border-radius: 10px;
      font-size: 0.95rem;
      color: var(--color-text);
      background: var(--color-bg);
      outline: none;
      transition: border-color 0.2s;
    }

    .input-group input:focus {
      border-color: var(--color-primary-lt);
    }

    /* 기본 버튼 */
    .btn-primary {
      width: 100%;
      padding: 13px;
      background: var(--color-primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 4px;
    }

    .btn-primary:hover  { background: #6a4dab; }
    .btn-primary:active { transform: scale(0.98); }

    /* 오류 메시지 */
    .error-msg {
      color: var(--color-error);
      font-size: 0.82rem;
      margin-top: 8px;
      min-height: 18px;
    }

    /* API 키 안내 링크 */
    .api-hint {
      margin-top: 20px;
      font-size: 0.8rem;
      color: var(--color-muted);
    }

    .api-hint a {
      color: var(--color-primary-lt);
      text-decoration: underline;
    }

    /* ────────────────────────────────────────────────
       채팅 화면 전체 레이아웃
    ──────────────────────────────────────────────── */
    #chat-screen {
      display: none;             /* API 키 입력 후 표시 */
      flex-direction: column;
      width: 100%;
      max-width: 700px;
      height: 100vh;
      padding: 0;
    }

    /* ── 헤더 ── */
    header {
      background: var(--color-primary);
      color: #fff;
      padding: 16px 20px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(124, 92, 191, 0.25);
    }

    .header-left {
      display: flex;
      flex-direction: column;
    }

    .header-title {
      font-size: 1.15rem;
      font-weight: 800;
      letter-spacing: -0.3px;
    }

    .header-sub {
      font-size: 0.75rem;
      opacity: 0.85;
      margin-top: 2px;
    }

    /* 설정(API Key 변경) 버튼 */
    .btn-settings {
      background: rgba(255,255,255,0.2);
      border: none;
      border-radius: 8px;
      color: #fff;
      padding: 7px 12px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .btn-settings:hover { background: rgba(255,255,255,0.35); }

    /* ── 면책 조항 배너 ── */
    .disclaimer {
      background: #fff4e5;
      border-bottom: 1px solid #f5d9a0;
      padding: 8px 16px;
      font-size: 0.75rem;
      color: #8a6820;
      text-align: center;
      flex-shrink: 0;
    }

    /* ── 메시지 목록 영역 ── */
    #message-list {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    /* 스크롤바 커스터마이징 (웹킷 기반 브라우저) */
    #message-list::-webkit-scrollbar { width: 5px; }
    #message-list::-webkit-scrollbar-thumb {
      background: var(--color-border);
      border-radius: 3px;
    }

    /* ── 말풍선 기본 ── */
    .message {
      display: flex;
      flex-direction: column;
      max-width: 80%;
    }

    /* AI 메시지 — 왼쪽 정렬 */
    .message.ai {
      align-self: flex-start;
    }

    /* 사용자 메시지 — 오른쪽 정렬 */
    .message.user {
      align-self: flex-end;
      align-items: flex-end;
    }

    /* 발신자 레이블 */
    .message-sender {
      font-size: 0.72rem;
      color: var(--color-muted);
      margin-bottom: 4px;
      padding: 0 4px;
    }

    /* 말풍선 본체 */
    .bubble {
      padding: 12px 16px;
      border-radius: var(--radius-bubble);
      font-size: 0.95rem;
      line-height: 1.65;
      word-break: keep-all;
      white-space: pre-wrap;   /* 줄바꿈 유지 */
    }

    /* AI 말풍선 */
    .message.ai .bubble {
      background: var(--color-accent);
      color: var(--color-text);
      border-top-left-radius: 4px;
    }

    /* 사용자 말풍선 */
    .message.user .bubble {
      background: var(--color-user-bubble);
      color: #fff;
      border-top-right-radius: 4px;
    }

    /* ── 로딩 인디케이터 (점 3개 깜빡임) ── */
    .loading-dots {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 18px;
      background: var(--color-accent);
      border-radius: var(--radius-bubble);
      border-top-left-radius: 4px;
      width: fit-content;
    }

    .loading-dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--color-primary-lt);
      display: inline-block;
      animation: bounce 1.2s infinite ease-in-out;
    }

    /* 각 점에 딜레이를 주어 물결 효과 */
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
      40%            { transform: scale(1.1); opacity: 1;   }
    }

    /* ── 입력 영역 ── */
    .input-area {
      flex-shrink: 0;
      padding: 12px 16px;
      background: var(--color-surface);
      border-top: 1px solid var(--color-border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    /* 메시지 입력창 */
    #user-input {
      flex: 1;
      padding: 11px 14px;
      border: 2px solid var(--color-border);
      border-radius: 12px;
      font-size: 0.95rem;
      font-family: inherit;
      color: var(--color-text);
      background: var(--color-bg);
      outline: none;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color 0.2s;
    }

    #user-input:focus { border-color: var(--color-primary-lt); }
    #user-input::placeholder { color: var(--color-muted); }

    /* 전송 버튼 */
    #send-btn {
      background: var(--color-primary);
      color: #fff;
      border: none;
      border-radius: 12px;
      width: 46px;
      height: 46px;
      font-size: 1.2rem;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
    }

    #send-btn:hover  { background: #6a4dab; }
    #send-btn:active { transform: scale(0.95); }
    #send-btn:disabled {
      background: var(--color-border);
      cursor: not-allowed;
    }

    /* ── 웰컴 메시지 (대화 시작 전 표시) ── */
    .welcome-msg {
      text-align: center;
      padding: 30px 20px;
      color: var(--color-muted);
    }

    .welcome-msg .emoji { font-size: 2.5rem; margin-bottom: 10px; }
    .welcome-msg p { font-size: 0.9rem; line-height: 1.7; }

    /* ── 반응형: 태블릿 이상 ── */
    @media (min-width: 600px) {
      #chat-screen {
        border-left:  1px solid var(--color-border);
        border-right: 1px solid var(--color-border);
        box-shadow: 0 0 40px rgba(124, 92, 191, 0.1);
      }

      header { padding: 18px 24px 16px; }

      .header-title { font-size: 1.25rem; }
    }
  </style>
</head>
<body>

  <!-- ============================================================
       화면 1: API Key 입력 화면
       처음 접속 시 또는 API Key가 없을 때 표시됩니다.
  ============================================================ -->
  <div id="api-key-screen">
    <div class="api-key-card">
      <!-- 로고 / 타이틀 -->
      <div class="logo">💜</div>
      <h1>내 이야기를 들어줘!</h1>
      <p class="desc">
        24시간 AI 심리 상담 서비스에 오신 것을 환영합니다.<br />
        시작하기 위해 Gemini API Key를 입력해주세요.
      </p>

      <!-- API Key 입력 폼 -->
      <div class="input-group">
        <label for="api-key-input">Gemini API Key</label>
        <input
          type="password"
          id="api-key-input"
          placeholder="AIza..."
          autocomplete="off"
        />
      </div>

      <!-- 오류 메시지 영역 -->
      <p class="error-msg" id="api-key-error"></p>

      <!-- 저장 & 시작 버튼 -->
      <button class="btn-primary" onclick="saveApiKey()">시작하기</button>

      <!-- API Key 발급 안내 -->
      <p class="api-hint">
        API Key가 없으신가요?<br />
        <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener">
          Google AI Studio에서 무료로 발급받기
        </a>
      </p>
    </div>
  </div>


  <!-- ============================================================
       화면 2: 채팅 화면
       API Key 저장 후 표시됩니다.
  ============================================================ -->
  <div id="chat-screen">

    <!-- 헤더 -->
    <header>
      <div class="header-left">
        <span class="header-title">💜 내 이야기를 들어줘!</span>
        <span class="header-sub">24시간 AI 심리 상담 · 언제든 곁에 있을게요</span>
      </div>
      <!-- 설정 버튼: API Key 변경 시 사용 -->
      <button class="btn-settings" onclick="showApiKeyScreen()">⚙ API Key 변경</button>
    </header>

    <!-- 면책 조항 -->
    <div class="disclaimer">
      ⚠ 이 서비스는 전문 의료·심리 상담을 대체하지 않습니다. 위기 상황이라면 전문가에게 도움을 받으세요.
    </div>

    <!-- 메시지 목록 -->
    <div id="message-list">
      <!-- 웰컴 메시지: 대화 전 안내 문구 -->
      <div class="welcome-msg" id="welcome-msg">
        <div class="emoji">🌸</div>
        <p>
          안녕하세요, 저는 당신의 이야기를 들어드릴 AI 상담사예요.<br />
          오늘 어떤 마음으로 오셨나요? 편하게 이야기해주세요.
        </p>
      </div>
    </div>

    <!-- 메시지 입력 영역 -->
    <div class="input-area">
      <!-- 자동 높이 조절 textarea -->
      <textarea
        id="user-input"
        rows="1"
        placeholder="오늘 어떤 일이 있었나요?"
      ></textarea>
      <!-- 전송 버튼 -->
      <button id="send-btn" onclick="sendMessage()" title="전송 (Enter)">
        ➤
      </button>
    </div>

  </div>


  <!-- ============================================================
       JavaScript 로직
  ============================================================ -->
  <script>
    // ──────────────────────────────────────────────
    // 전역 상태 변수
    // ──────────────────────────────────────────────

    /** Gemini API Key (localStorage에서 불러오거나 사용자가 입력) */
    let apiKey = '';

    /**
     * 대화 히스토리 배열
     * Gemini API의 contents 형식: [{role:'user',parts:[{text:'...'}]}, ...]
     */
    let conversationHistory = [];

    /**
     * AI 심리 상담사 시스템 프롬프트
     * AI의 역할, 태도, 응답 방식을 정의합니다.
     */
    const systemPrompt = `당신은 따뜻하고 공감 능력이 뛰어난 한국인 심리 상담사입니다.
사용자의 감정과 이야기에 진심으로 공감하며, 비판하거나 판단하지 않습니다.

[응답 원칙]
- 항상 한국어로 응답합니다.
- 사용자의 감정을 먼저 인정하고 공감합니다.
- 따뜻하고 안정감 있는 어조를 유지합니다.
- 조언보다는 경청과 질문을 우선합니다.
- 한 번에 너무 많은 질문을 하지 않습니다 (최대 1개).
- 사용자가 스스로 감정과 상황을 탐색할 수 있도록 돕습니다.
- 자해, 자살, 폭력 등 위기 상황이 감지되면 즉시 전문 기관(정신건강 위기상담 전화 1577-0199 또는 자살예방상담전화 1393)을 안내합니다.
- 응답은 200자 내외로 간결하게 작성합니다.
- 필요한 경우 전문 심리 상담사나 정신건강의학과 전문의 상담을 권유합니다.

당신은 사용자의 이야기를 경청하고, 그들이 스스로의 감정을 이해하도록 돕는 안전한 공간을 만들어줍니다.`;


    // ──────────────────────────────────────────────
    // 초기화: 페이지 로드 시 실행
    // ──────────────────────────────────────────────

    /**
     * 페이지가 로드될 때 localStorage에서 API Key를 확인합니다.
     * 저장된 키가 있으면 채팅 화면을, 없으면 API Key 입력 화면을 표시합니다.
     */
    function init() {
      const savedKey = localStorage.getItem('gemini_api_key');
      if (savedKey) {
        apiKey = savedKey;
        showChatScreen();
      } else {
        showApiKeyScreen();
      }
    }


    // ──────────────────────────────────────────────
    // 화면 전환 함수
    // ──────────────────────────────────────────────

    /** API Key 입력 화면을 표시합니다. */
    function showApiKeyScreen() {
      document.getElementById('api-key-screen').style.display = 'flex';
      document.getElementById('chat-screen').style.display = 'none';
      document.getElementById('api-key-error').textContent = '';
      // 현재 저장된 키가 있으면 입력창에 미리 채워둡니다
      document.getElementById('api-key-input').value = apiKey || '';
    }

    /** 채팅 화면을 표시합니다. */
    function showChatScreen() {
      document.getElementById('api-key-screen').style.display = 'none';
      document.getElementById('chat-screen').style.display = 'flex';
    }


    // ──────────────────────────────────────────────
    // API Key 저장 함수
    // ──────────────────────────────────────────────

    /**
     * 사용자가 입력한 API Key를 검증하고 localStorage에 저장합니다.
     * 저장 성공 시 채팅 화면으로 전환합니다.
     */
    function saveApiKey() {
      const inputEl  = document.getElementById('api-key-input');
      const errorEl  = document.getElementById('api-key-error');
      const inputVal = inputEl.value.trim();

      // 기본 형식 검증: Gemini API Key는 "AIza"로 시작합니다
      if (!inputVal) {
        errorEl.textContent = 'API Key를 입력해주세요.';
        return;
      }
      if (!inputVal.startsWith('AIza')) {
        errorEl.textContent = '올바른 Gemini API Key 형식이 아닙니다. (AIza...로 시작해야 합니다)';
        return;
      }

      // 유효하면 저장 후 채팅 화면으로 이동
      apiKey = inputVal;
      localStorage.setItem('gemini_api_key', apiKey);
      errorEl.textContent = '';
      showChatScreen();
    }


    // ──────────────────────────────────────────────
    // 메시지 전송 & AI 응답 함수
    // ──────────────────────────────────────────────

    /**
     * 사용자 메시지를 전송하고 AI 응답을 받아 화면에 표시합니다.
     * Gemini API를 직접 호출하여 대화를 이어갑니다.
     */
    async function sendMessage() {
      const inputEl  = document.getElementById('user-input');
      const sendBtn  = document.getElementById('send-btn');
      const userText = inputEl.value.trim();

      // 빈 메시지 또는 로딩 중 전송 방지
      if (!userText || sendBtn.disabled) return;

      // 웰컴 메시지 숨기기 (첫 메시지 전송 시)
      const welcomeEl = document.getElementById('welcome-msg');
      if (welcomeEl) welcomeEl.style.display = 'none';

      // 입력창 초기화 & 버튼 비활성화
      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.disabled = true;

      // 1. 사용자 메시지를 화면에 추가
      appendMessage('user', userText);

      // 2. 대화 히스토리에 사용자 메시지 추가
      conversationHistory.push({
        role: 'user',
        parts: [{ text: userText }]
      });

      // 3. 로딩 인디케이터 표시
      const loadingEl = appendLoading();

      try {
        // 4. Gemini API 호출 (gemini-1.5-flash: 무료 티어 지원 모델)
        const response = await fetch(
          `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              // 시스템 프롬프트로 AI 역할 설정
              system_instruction: {
                parts: [{ text: systemPrompt }]
              },
              // 전체 대화 히스토리 전송 (문맥 유지)
              contents: conversationHistory
            })
          }
        );

        // 5. 응답 파싱
        const data = await response.json();

        // API 오류 처리 (잘못된 키, 할당량 초과 등)
        if (!response.ok) {
          throw new Error(data.error?.message || `API 오류 (${response.status})`);
        }

        // AI 응답 텍스트 추출
        const aiReply = data.candidates?.[0]?.content?.parts?.[0]?.text;
        if (!aiReply) throw new Error('응답을 받지 못했습니다.');

        // 6. 로딩 제거 후 AI 메시지 표시
        loadingEl.remove();
        appendMessage('ai', aiReply);

        // 7. AI 응답을 대화 히스토리에 추가 (다음 요청에서 문맥 유지)
        conversationHistory.push({
          role: 'model',
          parts: [{ text: aiReply }]
        });

      } catch (err) {
        // 오류 발생 시 로딩 제거 후 오류 메시지 표시
        loadingEl.remove();

        // API Key 관련 오류인지 확인
        const isKeyError =
          err.message.includes('API_KEY_INVALID') ||
          err.message.includes('400') ||
          err.message.includes('403');

        const errorText = isKeyError
          ? 'API Key가 유효하지 않습니다. 설정에서 올바른 Key를 입력해주세요.'
          : `오류가 발생했습니다: ${err.message}`;

        appendMessage('ai', `⚠ ${errorText}`);

        // 대화 히스토리에서 실패한 사용자 메시지 제거 (재시도 허용)
        conversationHistory.pop();
      }

      // 8. 전송 버튼 다시 활성화 & 입력창 포커스
      sendBtn.disabled = false;
      inputEl.focus();
    }


    // ──────────────────────────────────────────────
    // UI 헬퍼 함수들
    // ──────────────────────────────────────────────

    /**
     * 채팅 목록에 메시지 말풍선을 추가합니다.
     * @param {'user'|'ai'} role - 발신자 역할
     * @param {string} text      - 메시지 내용
     */
    function appendMessage(role, text) {
      const listEl = document.getElementById('message-list');

      // 메시지 컨테이너 생성
      const msgEl = document.createElement('div');
      msgEl.className = `message ${role}`;

      // 발신자 이름 레이블
      const senderEl = document.createElement('div');
      senderEl.className = 'message-sender';
      senderEl.textContent = role === 'user' ? '나' : 'AI 상담사';

      // 말풍선 본체
      const bubbleEl = document.createElement('div');
      bubbleEl.className = 'bubble';
      bubbleEl.textContent = text;   // textContent로 XSS 방지

      msgEl.appendChild(senderEl);
      msgEl.appendChild(bubbleEl);
      listEl.appendChild(msgEl);

      // 새 메시지가 보이도록 스크롤 이동
      scrollToBottom();

      return msgEl;
    }

    /**
     * 로딩 인디케이터(점 3개 애니메이션)를 추가하고 요소를 반환합니다.
     * @returns {HTMLElement} 로딩 요소 (나중에 제거할 때 사용)
     */
    function appendLoading() {
      const listEl = document.getElementById('message-list');

      // AI 메시지 컨테이너처럼 생성
      const wrapEl = document.createElement('div');
      wrapEl.className = 'message ai';

      const senderEl = document.createElement('div');
      senderEl.className = 'message-sender';
      senderEl.textContent = 'AI 상담사';

      // 점 3개 로딩 애니메이션
      const dotsEl = document.createElement('div');
      dotsEl.className = 'loading-dots';
      dotsEl.innerHTML = '<span></span><span></span><span></span>';

      wrapEl.appendChild(senderEl);
      wrapEl.appendChild(dotsEl);
      listEl.appendChild(wrapEl);

      scrollToBottom();
      return wrapEl;
    }

    /**
     * 메시지 목록을 맨 아래로 스크롤합니다.
     */
    function scrollToBottom() {
      const listEl = document.getElementById('message-list');
      listEl.scrollTop = listEl.scrollHeight;
    }


    // ──────────────────────────────────────────────
    // 입력창 자동 높이 조절
    // ──────────────────────────────────────────────

    /**
     * textarea 입력에 따라 높이를 자동으로 조절합니다.
     * Enter 키 단독 누름 시 메시지를 전송합니다.
     */
    document.getElementById('user-input').addEventListener('input', function () {
      // 높이를 초기화했다가 scrollHeight로 다시 설정 (자동 높이)
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    document.getElementById('user-input').addEventListener('keydown', function (e) {
      // Enter 단독: 전송 / Shift+Enter: 줄바꿈
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();  // 기본 줄바꿈 동작 방지
        sendMessage();
      }
    });


    // ──────────────────────────────────────────────
    // API Key 입력창 Enter 키 처리
    // ──────────────────────────────────────────────

    document.getElementById('api-key-input').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') saveApiKey();
    });


    // ──────────────────────────────────────────────
    // 페이지 초기화 실행
    // ──────────────────────────────────────────────
    init();
  </script>

</body>
